name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: AbhishekSohal
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=ed6307&color_dots=161b22,3d1a05,7a3610,b84c0d,ed6307
            dist/github-contribution-grid-snake-dark.svg?color_snake=ed6307&color_dots=161b22,3d1a05,7a3610,b84c0d,ed6307
            dist/github-contribution-grid-snake.gif?color_snake=ed6307&color_dots=161b22,3d1a05,7a3610,b84c0d,ed6307

      - name: push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
