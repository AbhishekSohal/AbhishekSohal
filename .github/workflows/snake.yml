name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: AbhishekSohal
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=ed6307
            dist/github-contribution-grid-snake.gif?color_snake=ed6307&color_dots=161b22,ed630744,ed630788,ed6307cc,ed6307

      - uses: actions/checkout@v4
        with:
          ref: output
        continue-on-error: true

      - name: push snake to output branch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          mkdir -p dist
          cp -r ${{ github.workspace }}/dist/* dist/ 2>/dev/null || true
          git add -f dist/
          git commit -m "generate snake" || echo "no changes"
          git push origin HEAD:output --force